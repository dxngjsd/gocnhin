<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — GócNhìn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAYC9w4BTV-JTwF-7ha3K-63FaA9LOsukY",
      authDomain: "gocnhin-d6d91.firebaseapp.com",
      projectId: "gocnhin-d6d91",
      storageBucket: "gocnhin-d6d91.firebasestorage.app",
      messagingSenderId: "60814793201",
      appId: "1:60814793201:web:fdc96709ecda6121764c50"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Auth state
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'block';
        loadPosts();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('admin-screen').style.display = 'none';
      }
    });

    // Login
    window.doLogin = async () => {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const err = document.getElementById('login-error');
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        err.textContent = 'Email hoặc mật khẩu không đúng.';
      }
    };

    window.doLogout = () => signOut(auth);

    // Publish post
    window.publishPost = async () => {
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const excerpt = document.getElementById('excerpt').value.trim();
      const category = document.getElementById('category').value;
      const btn = document.getElementById('publish-btn');

      if (!title || !content) { showToast('Điền tiêu đề và nội dung!', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Đang đăng...';
      try {
        await addDoc(collection(db, "posts"), { title, content, excerpt, category, createdAt: serverTimestamp() });
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        document.getElementById('excerpt').value = '';
        showToast('Đăng bài thành công! ✓');
        loadPosts();
      } catch (e) {
        showToast('Lỗi đăng bài: ' + e.message, 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Đăng bài';
    };

    // Load posts list
    async function loadPosts() {
      const list = document.getElementById('posts-list');
      list.innerHTML = '<p class="loading">Đang tải...</p>';
      try {
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        if (snap.empty) { list.innerHTML = '<p class="loading">Chưa có bài nào.</p>'; return; }
        list.innerHTML = '';
        snap.forEach(d => {
          const p = d.data();
          const row = document.createElement('div');
          row.className = 'post-row';
          row.innerHTML = `
            <div class="post-row-info">
              <div class="post-row-title">${p.title}</div>
              <div class="post-row-meta">${p.category || 'Không có danh mục'} · ${formatDate(p.createdAt)}</div>
            </div>
            <div class="post-row-actions">
              <a href="post.html?id=${d.id}" target="_blank" class="btn-view">Xem →</a>
              <button class="btn-delete" onclick="deletePost('${d.id}')">Xóa</button>
            </div>
          `;
          list.appendChild(row);
        });
      } catch (e) {
        list.innerHTML = '<p class="loading">Lỗi tải bài.</p>';
      }
    }

    window.deletePost = async (id) => {
      if (!confirm('Xóa bài này?')) return;
      await deleteDoc(doc(db, "posts", id));
      showToast('Đã xóa bài.');
      loadPosts();
    };

    function formatDate(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('vi-VN', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      setTimeout(() => t.className = 'toast', 3000);
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal-400: #1D9E75; --teal-50: #E1F5EE; --teal-600: #0F6E56;
      --text-primary: #1a1a18; --text-secondary: #5F5E5A; --text-tertiary: #888780;
      --bg-primary: #ffffff; --bg-secondary: #F8F7F3; --border: rgba(0,0,0,0.1);
      --red: #E24B4A; --red-bg: #FCEBEB;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #F1EFE8; --text-secondary: #B4B2A9; --text-tertiary: #888780;
        --bg-primary: #1C1C1A; --bg-secondary: #242422; --border: rgba(255,255,255,0.1);
        --teal-50: #04342C; --teal-400: #5DCAA5; --teal-600: #9FE1CB;
        --red-bg: #2C1212;
      }
    }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg-secondary); color: var(--text-primary); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    /* LOGIN */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 380px; }
    .login-logo { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 600; margin-bottom: 28px; display: flex; align-items: center; gap: 6px; }
    .login-logo-dot { width: 7px; height: 7px; background: var(--teal-400); border-radius: 50%; }
    .login-title { font-size: 16px; font-weight: 500; margin-bottom: 20px; color: var(--text-secondary); }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-tertiary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .field input { width: 100%; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: 10px; background: var(--bg-secondary); color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: var(--teal-400); }
    #login-error { font-size: 12px; color: var(--red); margin-bottom: 12px; min-height: 16px; }
    .btn-primary { width: 100%; padding: 11px; background: var(--teal-400); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.85; }

    /* ADMIN */
    #admin-screen { display: none; }
    nav { background: var(--bg-primary); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 960px; margin: 0 auto; padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .logo-dot { width: 7px; height: 7px; background: var(--teal-400); border-radius: 50%; }
    .logo-badge { font-size: 11px; font-weight: 600; background: var(--teal-50); color: var(--teal-600); padding: 3px 8px; border-radius: 20px; }
    .btn-logout { font-size: 13px; color: var(--text-tertiary); background: none; border: 0.5px solid var(--border); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .btn-logout:hover { color: var(--red); border-color: var(--red); }

    .admin-page { max-width: 960px; margin: 0 auto; padding: 32px; display: grid; grid-template-columns: 1fr 380px; gap: 24px; align-items: start; }

    /* EDITOR */
    .editor-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: 16px; overflow: hidden; }
    .editor-header { padding: 18px 22px 14px; border-bottom: 0.5px solid var(--border); }
    .editor-title { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; }
    .editor-body { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
    .editor-field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-tertiary); margin-bottom: 6px; }
    .editor-field input, .editor-field select, .editor-field textarea {
      width: 100%; padding: 10px 14px; border: 0.5px solid var(--border);
      border-radius: 10px; background: var(--bg-secondary); color: var(--text-primary);
      font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    .editor-field input:focus, .editor-field select:focus, .editor-field textarea:focus { border-color: var(--teal-400); }
    .editor-field textarea { resize: vertical; line-height: 1.6; }
    #publish-btn { width: 100%; padding: 12px; background: var(--teal-400); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
    #publish-btn:hover:not(:disabled) { opacity: 0.85; }
    #publish-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* POSTS LIST */
    .list-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: 16px; overflow: hidden; position: sticky; top: 72px; }
    .list-header { padding: 16px 18px 12px; border-bottom: 0.5px solid var(--border); font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; }
    #posts-list { max-height: 600px; overflow-y: auto; }
    .post-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; border-bottom: 0.5px solid var(--border); }
    .post-row:last-child { border-bottom: none; }
    .post-row-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 3px; }
    .post-row-meta { font-size: 11px; color: var(--text-tertiary); }
    .post-row-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-view { font-size: 12px; color: var(--teal-400); border: 0.5px solid var(--teal-400); background: var(--teal-50); padding: 5px 10px; border-radius: 7px; white-space: nowrap; }
    .btn-delete { font-size: 12px; color: var(--red); border: 0.5px solid var(--red); background: var(--red-bg); padding: 5px 10px; border-radius: 7px; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .loading { padding: 20px; text-align: center; font-size: 13px; color: var(--text-tertiary); }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a18; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: var(--red); }

    @media (max-width: 760px) {
      .admin-page { grid-template-columns: 1fr; padding: 20px; }
      .list-card { position: static; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">GócNhìn <span class="login-logo-dot"></span></div>
      <div class="login-title">Đăng nhập để quản lý bài viết</div>
      <div class="field"><label>Email</label><input id="email" type="email" placeholder="your@email.com" /></div>
      <div class="field"><label>Mật khẩu</label><input id="password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
      <div id="login-error"></div>
      <button class="btn-primary" onclick="doLogin()">Đăng nhập</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="admin-screen">
    <nav>
      <div class="nav-inner">
        <div class="logo">GócNhìn <span class="logo-dot"></span> <span class="logo-badge">Admin</span></div>
        <div style="display:flex;align-items:center;gap:12px;">
          <a href="index.html" target="_blank" style="font-size:13px;color:var(--text-tertiary);">Xem trang →</a>
          <button class="btn-logout" onclick="doLogout()">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <div class="admin-page">
      <div class="editor-card">
        <div class="editor-header"><div class="editor-title">Viết bài mới</div></div>
        <div class="editor-body">
          <div class="editor-field">
            <label>Tiêu đề</label>
            <input id="title" type="text" placeholder="VD: MSN Q1/2025 — Mảng tiêu dùng phục hồi..." />
          </div>
          <div class="editor-field">
            <label>Danh mục</label>
            <select id="category">
              <option value="CANSLIM">CANSLIM</option>
              <option value="Phân tích ngành">Phân tích ngành</option>
              <option value="Vĩ mô VN">Vĩ mô VN</option>
              <option value="Kiến thức">Kiến thức</option>
            </select>
          </div>
          <div class="editor-field">
            <label>Tóm tắt ngắn (hiển thị trên trang chủ)</label>
            <textarea id="excerpt" rows="2" placeholder="1–2 câu tóm tắt bài viết..."></textarea>
          </div>
          <div class="editor-field">
            <label>Nội dung bài viết</label>
            <textarea id="content" rows="18" placeholder="Viết nội dung bài phân tích ở đây..."></textarea>
          </div>
          <button id="publish-btn" onclick="publishPost()">Đăng bài</button>
        </div>
      </div>

      <div class="list-card">
        <div class="list-header">Bài đã đăng</div>
        <div id="posts-list"><p class="loading">Đang tải...</p></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</body>
</html>
